<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>تفاصيل الفعالية</title>


    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">


    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">


    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">

</head>


<body>


<!-- NAVBAR -->

<div id="navbar"></div>




<main class="container mt-5">


    <div class="row g-4">


        <!-- EVENT DETAILS -->

        <div class="col-lg-8">


            <img id="eventImage"
                 class="img-fluid rounded mb-4"
                 alt="صورة الفعالية">



            <h1 id="eventTitle"></h1>


            <p class="text-muted"
               id="eventMeta"></p>



            <p id="eventDesc"></p>



            <!-- BUTTONS -->

            <button class="btn btn-success me-2"
                    id="addCalendar">

                أضف للتقويم

            </button>



            <button class="btn btn-primary me-2"
                    id="shareBtn">

                مشاركة

            </button>



            <button class="btn btn-warning"
                    data-bs-toggle="modal"
                    data-bs-target="#bookModal">

                حجز الفعالية

            </button>




            <!-- MAP -->

            <div class="mt-5">


                <h5>
                    الموقع على الخريطة
                </h5>


                <img id="eventMap"
                     class="img-fluid rounded"
                     alt="خريطة موقع الفعالية">


            </div>





            <!-- GALLERY -->

            <div class="mt-5">


                <h5>
                    معرض الصور
                </h5>


                <div class="row g-2">


                    <div class="col-md-4">

                        <img src="assets/img/educational.jpg"
                             class="img-fluid rounded"
                             alt="صورة تعليمية">

                    </div>



                    <div class="col-md-4">

                        <img src="assets/img/acadimic seminar.jpg"
                             class="img-fluid rounded"
                             alt="صورة مؤتمر">

                    </div>



                    <div class="col-md-4">

                        <img src="assets/img/programming.jpg"
                             class="img-fluid rounded"
                             alt="صورة برمجة">

                    </div>


                </div>


            </div>



        </div>






        <!-- INFORMATION CARD -->


        <div class="col-lg-4">


            <div class="card shadow">


                <div class="card-body">


                    <h4>
                        معلومات الفعالية
                    </h4>


                    <hr>


                    <p id="eventDate"></p>


                    <p id="eventLocation"></p>


                    <p id="eventCategory"></p>



                </div>


            </div>


        </div>



    </div>





    <hr class="my-5">






    <!-- RELATED EVENTS -->


    <h2 class="mb-4">
        فعاليات ذات صلة
    </h2>




    <div class="row g-4">



        <div class="col-md-4">


            <div class="card h-100">


                <img src="assets/img/programming_workshop.jpg"
                     class="card-img-top"
                     alt="برمجة و تكويد ">


                <div class="card-body">


                    <h5>
                        برمجة و تكويد 
                    </h5>


                    <a href="event.html?id=programming"
                       class="btn btn-primary w-100">

                        التفاصيل

                    </a>


                </div>


            </div>


        </div>





        <div class="col-md-4">


            <div class="card h-100">


                <img src="assets/img/laww.jpg"
                     class="card-img-top"
                     alt="حقوق">


                <div class="card-body">


                    <h5>
                        ندوة قانونية
                    </h5>


                    <a href="event.html?id=law"
                       class="btn btn-primary w-100">

                        التفاصيل

                    </a>


                </div>


            </div>


        </div>





        <div class="col-md-4">


            <div class="card h-100">


                <img src="assets/img/seminar.jpg"
                     class="card-img-top"
                     alt="دراسات عليا">


                <div class="card-body">


                    <h5>
                        الدراسات العليا
                    </h5>


                    <a href="event.html?id=culture"
                       class="btn btn-primary w-100">

                        التفاصيل

                    </a>


                </div>


            </div>


        </div>



    </div>



</main>








<!-- BOOKING MODAL -->


<div class="modal fade"
     id="bookModal">


    <div class="modal-dialog">


        <div class="modal-content">


            <div class="modal-header">


                <h5 class="modal-title">
                    حجز الفعالية
                </h5>


                <button class="btn-close"
                        data-bs-dismiss="modal">

                </button>


            </div>



            <div class="modal-body">


                <input type="text"
                       id="userName"
                       class="form-control mb-2"
                       placeholder="الاسم">


                <input type="email"
                       id="userEmail"
                       class="form-control mb-2"
                       placeholder="البريد الإلكتروني">


                <small id="bookingMsg"></small>


            </div>



            <div class="modal-footer">


                <button id="confirmBooking"
                        class="btn btn-success">

                    تأكيد الحجز

                </button>


            </div>



        </div>


    </div>


</div>



<!-- JS FILES -->


<script src="assets/js/events_data.js"></script>


<script src="assets/js/components.js"></script>



<script>


const params = new URLSearchParams(window.location.search);


const id = params.get("id");


const event = EVENTS_DATA[id];



if(event){


    document.getElementById("eventTitle").textContent = event.title;


    document.getElementById("eventImage").src = event.image;


    document.getElementById("eventDesc").textContent = event.desc;


    document.getElementById("eventMeta").textContent =
    `التاريخ: ${event.date} | المكان: ${event.location} | التصنيف: ${event.category}`;



    document.getElementById("eventDate").textContent =
    "📅 التاريخ: " + event.date;



    document.getElementById("eventLocation").textContent =
    "📍 المكان: " + event.location;



    document.getElementById("eventCategory").textContent =
    "🏷 التصنيف: " + event.category;



    document.getElementById("eventMap").src =
    event.map || "assets/img/location.jpg";


}






// BOOKING


document.getElementById("confirmBooking")
.addEventListener("click",function(){


let name =
document.getElementById("userName").value.trim();



let email =
document.getElementById("userEmail").value.trim();



let msg =
document.getElementById("bookingMsg");



if(!name || !email){


msg.textContent="يرجى تعبئة جميع الحقول";

msg.className="text-danger";

return;

}



let bookings =
JSON.parse(localStorage.getItem("bookings")) || [];



bookings.push({

eventId:id,

eventTitle:event.title,

name:name,

email:email,

date:new Date().toLocaleString()

});



localStorage.setItem(
"bookings",
JSON.stringify(bookings)
);



msg.textContent="تم الحجز بنجاح";

msg.className="text-success";


});







// CALENDAR


document.getElementById("addCalendar")
.addEventListener("click",function(){


let url =
`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(event.title)}&details=${encodeURIComponent(event.desc)}&location=${encodeURIComponent(event.location)}`;


window.open(url,"_blank");


});







// SHARE


document.getElementById("shareBtn")
.addEventListener("click",function(){


if(navigator.share){


navigator.share({

title:event.title,

text:event.desc,

url:window.location.href

});


}

else{


navigator.clipboard.writeText(window.location.href);


alert("تم نسخ الرابط");


}


});


</script>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>


<script src="assets/js/main.js"></script>



</body>

</html>
